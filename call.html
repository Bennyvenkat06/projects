<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call | SkillSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: var(--bg-main); 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
        }

        .call-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Video Area Layout */
        .video-grid {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        .remote-video-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video#remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Change to contain if we want black bars instead of crop */
        }

        .local-video-container {
            position: absolute;
            bottom: 120px;
            right: 40px;
            width: 240px;
            height: 160px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 10;
            background: #2a2a2a;
            transition: transform 0.3s;
        }
        .local-video-container:hover { transform: scale(1.05); cursor: move; }

        video#localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror local video */
        }

        /* Overlay Infos */
        .call-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            pointer-events: none;
        }

        .partner-info h2 { margin: 0; font-size: 1.25rem; }
        .call-timer { font-family: monospace; font-size: 1.125rem; font-weight: bold; }

        /* Status Banner */
        .status-banner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 1rem 2rem;
            border-radius: var(--radius-pill);
            color: white;
            font-weight: 500;
            z-index: 15;
            display: none; /* toggled via JS */
        }

        /* Controls Bar */
        .controls-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 20;
        }

        .control-btn {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            color: white;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .control-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .control-btn.active-danger { background: var(--danger); }
        .control-btn.active-danger:hover { background: hsl(var(--hue-danger), 80%, 45%); }

        .end-call-btn {
            background: var(--danger);
            width: 64px; height: 64px;
        }
        .end-call-btn:hover { background: hsl(var(--hue-danger), 80%, 45%); transform: scale(1.05); }

        .accept-call-btn {
            background: var(--success);
        }

        /* Initial Room Joining Modal */
        .join-modal-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: var(--bg-main);
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }

        .join-card {
            width: 100%; max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        .input-group { margin: 1.5rem 0; text-align: left; }
        .form-control {
            width: 100%; padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-main); color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .local-video-container { width: 120px; height: 180px; bottom: 100px; right: 20px; }
            .controls-bar { padding: 1rem; gap: 1rem; }
            .control-btn { width: 48px; height: 48px; }
            .end-call-btn { width: 56px; height: 56px; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="call-container">
        
        <!-- Join/Create Room Modal -->
        <div id="join-modal" class="join-modal-overlay">
            <div class="join-card">
                <a href="chat.html" class="icon-btn" style="position:absolute; top: 1rem; left: 1rem; background: transparent; border:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h2 style="margin-bottom: 0.5rem">SkillSwap Call Room</h2>
                <p style="color: var(--text-muted)">Start a new call or join a partner.</p>

                <div style="margin-top: 2rem;">
                    <button class="btn btn-primary btn-large" id="create-btn" style="width: 100%; margin-bottom: 1rem;">
                        Start Call (Create Room)
                    </button>
                    
                    <div style="display:flex; align-items:center; margin: 1rem 0; color:var(--text-muted); font-size:0.875rem;">
                        <span style="flex:1; height:1px; background:var(--border-color)"></span>
                        <span style="margin: 0 1rem;">OR</span>
                        <span style="flex:1; height:1px; background:var(--border-color)"></span>
                    </div>

                    <div class="input-group">
                        <label style="display:block; margin-bottom:0.5rem; font-weight:500;">Enter Room ID to join</label>
                        <input type="text" id="room-id" class="form-control" placeholder="Room ID sent by partner">
                    </div>
                    <button class="btn btn-secondary btn-large" id="join-btn" style="width: 100%;">
                        Join Call
                    </button>
                    
                    <div id="room-created-msg" style="display:none; margin-top: 1rem; padding: 1rem; background: hsla(var(--hue-success),80%,40%,0.1); border-radius: var(--radius-sm); border: 1px solid var(--success);">
                        <p style="margin:0; font-size:0.875rem; color:var(--success); font-weight:bold;">Room Created!</p>
                        <p style="margin:0.5rem 0 0 0; font-size:0.75rem;">Copy ID and send it in chat:</p>
                        <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                            <input type="text" id="current-room-display" class="form-control" readonly style="font-family:monospace;">
                            <button id="copy-room-btn" class="btn btn-secondary">Copy</button>
                        </div>
                        <button id="enter-room-btn" class="btn btn-primary" style="margin-top:1rem; width:100%;">Enter Waiting Room</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Call View -->
        <div class="video-grid">
            <div class="call-header">
                <div class="partner-info">
                    <h2 id="partner-name">Waiting for partner...</h2>
                    <span style="font-size:0.875rem; opacity:0.8;" id="connection-status">Connecting</span>
                </div>
                <div class="call-timer" id="call-timer">00:00</div>
            </div>

            <div class="status-banner" id="status-banner">Waiting for other to join...</div>

            <!-- Remote Video Fullscreen -->
            <div class="remote-video-container">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            
            <!-- Local Video PIP -->
            <div class="local-video-container" id="local-video-wrapper">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="controls-bar">
            <!-- Mic Toggle -->
            <button class="control-btn" id="toggle-mic" title="Mute/Unmute Mic">
                <svg id="mic-on-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v10"></path><path d="M12 2v10"></path><line x1="12" y1="21" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><rect x="8" y="1" width="8" height="14" rx="4" ry="4"></rect></svg>
                <svg id="mic-off-icon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>

            <!-- Camera Toggle -->
            <button class="control-btn" id="toggle-cam" title="Turn off Camera">
                <svg id="cam-on-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                <svg id="cam-off-icon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>

            <!-- End Call -->
            <button class="control-btn end-call-btn" id="end-call-btn" title="End Call">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
            </button>

            <!-- Screen Share -->
            <button class="control-btn" id="share-screen-btn" title="Share Screen">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            </button>
            
            <!-- Chat PIP Toggle -->
            <button class="control-btn" onclick="window.location.href='chat.html'" title="Back to Chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </button>
        </div>

    </div>

    <!-- Firebase and WebRTC logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/videoCall.js"></script>

    <script>
        // Simple drag logic for local video PIP (pure UI function)
        const localVideoWrap = document.getElementById('local-video-wrapper');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        localVideoWrap.addEventListener('mousedown', dragStart);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('mousemove', drag);

        localVideoWrap.addEventListener('touchstart', dragStart, {passive: false});
        document.addEventListener('touchend', dragEnd);
        document.addEventListener('touchmove', drag, {passive: false});

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            if (e.target === localVideoWrap || e.target.tagName === 'VIDEO') {
                isDragging = true;
            }
        }

        function dragEnd() {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                xOffset = currentX;
                yOffset = currentY;

                localVideoWrap.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }
    </script>
</body>
</html>
