<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SkillSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            background: var(--bg-main);
            overflow: auto; /* Allow scroll for long form */
        }
        
        .auth-bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, hsla(var(--hue-secondary), 90%, 60%, 0.1) 0%, transparent 60%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            z-index: 0;
            pointer-events: none;
        }
        
        .auth-container {
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }
        
        .auth-card {
            padding: 3rem;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            display: inline-block;
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .auth-logo span { color: var(--primary); }
        
        .auth-title { margin-bottom: 0.5rem; }
        .auth-subtitle { color: var(--text-muted); }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }
        
        .form-group { margin-bottom: 1.5rem; }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            transition: var(--transition-fast);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px hsla(var(--hue-primary), 90%, 60%, 0.2);
        }

        .skills-multi-input {
            position: relative;
        }

        .skills-help {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .auth-btn { width: 100%; margin-top: 1.5rem; }
        
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .auth-footer a { color: var(--primary); font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .error-message {
            color: var(--danger);
            background: hsla(var(--hue-danger), 80%, 55%, 0.1);
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body class="dark-theme">
    
    <div class="auth-layout">
        <div class="auth-bg-glow"></div>
        
        <div class="auth-container">
            <div class="glass-panel auth-card">
                <div class="auth-header">
                    <a href="index.html" class="auth-logo">Skill<span>Swap</span></a>
                    <h1 class="auth-title">Join the Matchmaking Economy</h1>
                    <p class="auth-subtitle">Create your profile and start trading your skills today.</p>
                </div>
                
                <div id="signup-error" class="error-message"></div>

                <form id="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username" class="form-label">Full Name / Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Alex Chen" required>
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a secure password (min 6 chars)" required minlength="6">
                    </div>

                    <hr style="border:none; border-top:1px solid var(--border-color); margin: 2rem 0;">

                    <div class="form-row">
                        <div class="form-group skills-multi-input">
                            <label for="skills_offered" class="form-label">I can teach/offer:</label>
                            <input type="text" id="skills_offered" class="form-control" placeholder="e.g. React, UI Design, Marketing" required>
                            <p class="skills-help">Comma separated list of your best skills.</p>
                        </div>
                        <div class="form-group skills-multi-input">
                            <label for="skills_wanted" class="form-label">I want to learn:</label>
                            <input type="text" id="skills_wanted" class="form-control" placeholder="e.g. Spanish, 3D Modeling, Python" required>
                            <p class="skills-help">Comma separated list of skills you desire.</p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="bio" class="form-label">Short Bio (Optional)</label>
                        <textarea id="bio" class="form-control" rows="3" placeholder="Tell potential partners a bit about your experience..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary auth-btn" id="signup-btn">
                        Create Free Account
                    </button>
                    
                    <p style="font-size: 0.75rem; text-align: center; color: var(--text-muted); margin-top: 1rem;">
                        By signing up, you agree to our Terms of Service and Privacy Policy.
                    </p>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log in here</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (v9 Modules) -->
    <!-- Will be initialized and used in js/auth.js -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
