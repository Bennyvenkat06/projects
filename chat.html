<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | SkillSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { overflow: hidden; } /* Prevent whole page scroll, keep inner scroll */
        
        .chat-layout {
            display: flex;
            height: calc(100vh - var(--nav-height));
            margin-top: var(--nav-height);
        }

        /* Sidebar for Conversation List */
        .chat-sidebar {
            width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .chat-header-top {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .chat-header-top h3 { margin: 0; font-size: 1.25rem; }
        
        .search-box {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .search-box input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            color: var(--text-main);
        }

        .conv-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .conv-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .conv-item:hover, .conv-item.active {
            background: hsla(var(--hue-primary), 90%, 60%, 0.1);
        }

        .conv-avatar {
            position: relative;
        }
        .conv-avatar img {
            width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
        }
        .online-dot {
            position: absolute; right: 0; bottom: 0;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--success); border: 2px solid var(--bg-card);
        }

        .conv-info { flex-grow: 1; overflow: hidden; }
        .conv-top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.25rem; }
        .conv-top-row h4 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .conv-time { font-size: 0.75rem; color: var(--text-muted); }
        .conv-last-msg { font-size: 0.875rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread { font-weight: bold; color: var(--text-main); }

        /* Active Chat Area */
        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        /* Default State Object */
        .no-chat-selected {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-main); z-index: 5;
            color: var(--text-muted); text-align: center;
        }
        .no-chat-selected svg { font-size: 4rem; opacity: 0.2; margin-bottom: 1rem; width: 64px; height: 64px; }

        .active-chat-header {
            padding: 1rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .active-user-info { display: flex; align-items: center; gap: 1rem; }
        .active-user-info img { width: 40px; height: 40px; border-radius: 50%; }

        .chat-controls { display: flex; gap: 0.5rem; }

        .chat-history {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg-bubble {
            max-width: 60%;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            position: relative;
            line-height: 1.4;
        }
        .msg-bubble p { margin: 0; word-wrap: break-word; }
        .msg-time { display: block; font-size: 0.7rem; margin-top: 0.5rem; opacity: 0.7; }

        .msg-received {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 0;
            align-self: flex-start;
        }
        .msg-sent {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
            align-self: flex-end;
        }

        .chat-input-area {
            padding: 1.5rem 2rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .msg-input {
            flex-grow: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-pill);
            padding: 0.875rem 1.5rem;
            color: var(--text-main);
            font-family: inherit;
        }
        .msg-input:focus { outline: none; border-color: var(--primary); }

        .send-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-fast);
        }
        .send-btn:hover { background: var(--primary-hover); transform: scale(1.05); }

        /* Responsive */
        .mobile-back-btn { display: none; }
        @media (max-width: 768px) {
            .chat-layout { position: relative; }
            .chat-sidebar { width: 100%; position: absolute; top:0; left:0; height: 100%; transition: transform 0.3s; }
            .chat-main { width: 100%; position: absolute; top:0; left:0; height: 100%; }
            .mobile-back-btn { display: flex; margin-right: 1rem; }
            
            /* Toggle logic classes handled by JS */
            .show-main .chat-sidebar { transform: translateX(-100%); }
            .show-main .chat-main { transform: translateX(0); z-index: 20; }
            .hide-main .chat-main { transform: translateX(100%); z-index: 0; }
        }

    </style>
</head>
<body class="dark-theme">
    
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo">Skill<span>Swap</span></a>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
            </nav>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="chat-layout hide-main" id="mobile-layout-wrapper">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <div class="chat-header-top">
                <a href="dashboard.html" class="icon-btn" aria-label="Back to Dashboard" style="width: 36px; height: 36px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h3>Messages</h3>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search conversations...">
            </div>
            
            <div class="conv-list" id="conversations-list">
                <!-- Data populated via chat.js -->
                <p style="text-align:center; color: var(--text-muted); margin-top: 2rem;" id="loading-convs">Loading matches...</p>
                
                <!-- Mockup template for CSS viewing -->
                <!-- <div class="conv-item">
                    <div class="conv-avatar">
                        <img src="https://i.pravatar.cc/150?img=11" alt="David">
                        <div class="online-dot"></div>
                    </div>
                    <div class="conv-info">
                        <div class="conv-top-row">
                            <h4>David K.</h4>
                            <span class="conv-time">10:42 AM</span>
                        </div>
                        <p class="conv-last-msg">Sounds good, let's jump on a call.</p>
                    </div>
                </div> -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <!-- Overlay when no chat is selected -->
            <div class="no-chat-selected" id="no-chat-overlay">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3>Select a conversation</h3>
                <p>Choose a match from the left menu to start swappin' skills.</p>
            </div>

            <div class="active-chat-header">
                <div class="active-user-info">
                    <button class="icon-btn mobile-back-btn" id="mobile-back">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <img src="https://i.pravatar.cc/150?img=0" alt="Avatar" id="active-chat-avatar">
                    <div style="display:flex; flex-direction:column;">
                        <h3 style="margin:0; font-size:1.125rem;" id="active-chat-name">User Name</h3>
                        <span style="font-size:0.75rem; color:var(--success);">Online</span>
                    </div>
                </div>
                <div class="chat-controls">
                    <button class="icon-btn" id="start-video-btn" title="Start Video Call">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </button>
                </div>
            </div>

            <div class="chat-history" id="chat-history">
                <!-- Messages populated via chat.js -->
            </div>

            <form class="chat-input-area" id="chat-form">
                <input type="text" class="msg-input" id="msg-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" class="send-btn" aria-label="Send Message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/chat.js"></script>
    
    <script>
        // Mobile layout handlers
        document.getElementById('mobile-back')?.addEventListener('click', () => {
            const wrapper = document.getElementById('mobile-layout-wrapper');
            wrapper.classList.remove('show-main');
            wrapper.classList.add('hide-main');
        });
        
        // Expose a global function for chat.js to call when a conversation is clicked
        window.openMobileChat = function() {
            if(window.innerWidth <= 768) {
                const wrapper = document.getElementById('mobile-layout-wrapper');
                wrapper.classList.remove('hide-main');
                wrapper.classList.add('show-main');
            }
        }
    </script>
</body>
</html>
